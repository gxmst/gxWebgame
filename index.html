<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#072f3f" />
<meta name="description" content="gx 小游戏合集 —— 纯网页、即开即玩的休闲小游戏。" />
<title>gx 小游戏合集</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #051f2b;
    --bg2: #083849;
    --ink: #f5fbf7;
    --muted: #9ab6bd;
    --accent: #f2b632;
    --accent2: #7ee7df;
    --card: rgba(9, 40, 52, 0.72);
    --line: rgba(255, 255, 255, 0.1);
  }
  html, body { min-height: 100%; }
  body {
    font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 50% -10%, #0c6d87 0%, transparent 55%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg) 60%, #041720 100%);
    background-attachment: fixed;
    min-height: 100vh;
    padding: clamp(24px, 5vw, 64px) clamp(16px, 4vw, 48px) 48px;
  }

  header.hero { max-width: 1080px; margin: 0 auto clamp(28px, 5vw, 52px); text-align: center; }
  .hero-kicker {
    color: var(--accent);
    font: 700 12px "Courier New", monospace;
    letter-spacing: 4px;
    margin-bottom: 14px;
  }
  .hero h1 {
    font-size: clamp(34px, 7vw, 64px);
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
  }
  .hero h1 em { color: var(--accent2); font-style: normal; }
  .hero p.intro {
    max-width: 620px;
    margin: 18px auto 0;
    color: var(--muted);
    font-size: clamp(14px, 2.2vw, 16px);
    line-height: 1.7;
  }
  main.grid {
    max-width: 1080px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: clamp(16px, 2.5vw, 26px);
  }

  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    box-shadow: 0 8px 26px rgba(0, 0, 0, 0.28);
  }
  .card:hover, .card:focus-visible {
    transform: translateY(-4px);
    border-color: var(--accent2);
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.42);
    outline: none;
  }
  .card.coming { pointer-events: none; opacity: 0.55; }

  .card-thumb {
    aspect-ratio: 16 / 10;
    display: grid;
    place-items: center;
    font-size: 54px;
    background: linear-gradient(150deg, #0c6d87, #06323f);
    border-bottom: 1px solid var(--line);
  }
  .card-body { padding: 16px 18px 18px; flex: 1; display: flex; flex-direction: column; }
  .card-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .card-desc { color: var(--muted); font-size: 13px; line-height: 1.6; flex: 1; }
  .card-tag {
    align-self: flex-start;
    margin-top: 14px;
    font: 700 11px "Courier New", monospace;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(242, 182, 50, 0.15);
    color: var(--accent);
    border: 1px solid rgba(242, 182, 50, 0.4);
  }
  .card.coming .card-tag {
    background: rgba(255, 255, 255, 0.06);
    color: var(--muted);
    border-color: var(--line);
  }

  footer.site-foot {
    max-width: 1080px;
    margin: clamp(36px, 6vw, 64px) auto 0;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
  }
</style>
</head>
<body>
<header class="hero">
  <p class="hero-kicker">GX ARCADE</p>
  <h1>gx <em>小游戏</em> 合集</h1>
  <p class="intro">纯网页、即开即玩的休闲小游戏。无需下载、无需登录，打开就能玩。手机、电脑都支持。</p>
</header>

<main class="grid">
  <a class="card" href="./bigfish/index.html">
    <div class="card-thumb">🐟</div>
    <div class="card-body">
      <div class="card-title">大鱼吃小鱼</div>
      <p class="card-desc">从一尾鱼苗游成海洋霸主。吃掉更小的鱼成长，躲开天敌和渔网，成为深海之王。</p>
      <span class="card-tag">可以玩</span>
    </div>
  </a>

  <div class="card coming">
    <div class="card-thumb">🏰</div>
    <div class="card-body">
      <div class="card-title">塔防（暂定）</div>
      <p class="card-desc">在路线两旁布防，抵挡一波波来袭的敌人。规划、升级、守住阵地。</p>
      <span class="card-tag">开发中</span>
    </div>
  </div>

  <a class="card" href="./dungeon/index.html">
    <div class="card-thumb">⚔️</div>
    <div class="card-body">
      <div class="card-title">文字地牢</div>
      <p class="card-desc">刷装备、变强、下更深的地牢。经典 Roguelike 刷子循环的文字版。</p>
      <span class="card-tag">可以玩</span>
    </div>
  </a>
</main>

<footer class="site-foot">
  <p>gx 小游戏合集 · 纯前端 · 打开即玩</p>
</footer>
</body>
</html>
