name: Build and publish Android app

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Android version name (for example 1.0.0)
        required: true
        default: 1.0.0
        type: string
      release_notes:
        description: Optional release notes
        required: false
        default: Initial GX Arcade Android release.
        type: string

permissions:
  contents: write

concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run game tests
        run: |
          node bigfish/tests/run-node.mjs
          node dungeon/tests/run-node.mjs

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Restore release signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/gx-arcade-release.keystore"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/gx-arcade-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >-
          gradle -p android-app :app:assembleRelease
          -PversionName=${{ inputs.version_name }}
          -PversionCode=${{ github.run_number }}
          --no-daemon

      - name: Verify and package APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -f android-app/app/build/outputs/apk/release/app-release.apk
          cp android-app/app/build/outputs/apk/release/app-release.apk GX-Arcade.apk
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner" verify --verbose --print-certs GX-Arcade.apk
          keytool -list -keystore "$RUNNER_TEMP/gx-arcade-release.keystore" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null
          sha256sum GX-Arcade.apk > GX-Arcade.apk.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GX-Arcade-${{ inputs.version_name }}
          path: |
            GX-Arcade.apk
            GX-Arcade.apk.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ inputs.version_name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          printf '%s\n\n%s\n' "GX 小游戏 Android ${VERSION_NAME}" "${RELEASE_NOTES}" > "$RUNNER_TEMP/release-notes.md"
          gh release create "android-v${VERSION_NAME}" \
            GX-Arcade.apk GX-Arcade.apk.sha256 \
            --title "GX 小游戏 Android ${VERSION_NAME}" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --latest
